{% extends "base.html" %}

{% block title %}Страница не найдена — Мебельный магазин "Уют"{% endblock %}

{% block content %}

<section class="error-section py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-6 text-center">
                <i class="bi bi-exclamation-triangle display-1 text-warning"></i>
                <h1 class="display-1 fw-bold mt-4">404</h1>
                <h2 class="mb-4">Страница не найдена</h2>
                <p class="lead text-muted mb-4">К сожалению, запрашиваемая страница не существует или была удалена.</p>
                <div class="d-flex justify-content-center gap-3">
                    <a href="{{ url_for('index') }}" class="btn btn-primary btn-lg">На главную</a>
                    <a href="{{ url_for('catalog') }}" class="btn btn-outline-secondary btn-lg">В каталог</a>
                </div>
            </div>
        </div>
    </div>
</section>

{% endblock %}
